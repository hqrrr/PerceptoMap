name: Star History

on:
  schedule:
    - cron: '0 4 * * *'   # start at 04:00, every 24 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: narayann7/star-history-action@v1
        with:
          repos: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
